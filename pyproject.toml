[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_post"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "post feature"

[tool.splent.contract.provides]
routes     = ["/admin/posts", "/admin/posts/<int:post_id>/delete", "/admin/posts/<int:post_id>/edit", "/admin/posts/new", "/blog"]
blueprints = []
models     = ["Category", "Post"]
commands   = ["hello"]
hooks      = ["home.section", "layout.authenticated_sidebar"]
services   = ["PostService"]
signals    = []
translations = ["en", "es"]
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = ["POST_PERMALINK"]
signals  = []

[tool.splent.contract.extensible]
services  = ["PostService"]
templates = ["post/admin/form.html", "post/admin/list.html", "post/detail.html", "post/home_latest.html", "post/index.html", "post/list.html"]
models    = ["Category", "Post"]
hooks     = ["home.section", "layout.authenticated_sidebar", "post.comments"]
routes    = false
